openapi: 3.0.3
info:
  title: QA Admin Portal API Contract
  version: 1.0.0
  description: Minimal outward API contract for provider verification in CI.
paths:
  /auth/login:
    post:
      summary: Authenticate a user and set the session cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccessResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthInvalidCredentialsErrorEnvelope"
  /me:
    get:
      summary: Get the authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedErrorEnvelope"
  /users:
    get:
      summary: List users
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: sort
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorEnvelope"
        "401":
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedErrorEnvelope"
components:
  schemas:
    LoginSuccessResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
          enum:
            - true
    CurrentUser:
      type: object
      required:
        - id
        - email
        - role
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - admin
            - viewer
    CurrentUserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/CurrentUser"
    UserSummary:
      type: object
      required:
        - id
        - email
        - role
        - status
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - admin
            - viewer
        status:
          type: string
          enum:
            - active
            - disabled
        createdAt:
          type: string
          format: date-time
    UserListResponse:
      type: object
      required:
        - items
        - page
        - pageSize
        - total
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/UserSummary"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    ErrorBase:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          nullable: true
    UnauthorizedErrorEnvelope:
      type: object
      required:
        - error
        - requestId
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - UNAUTHORIZED
            message:
              type: string
        requestId:
          type: string
    AuthInvalidCredentialsErrorEnvelope:
      type: object
      required:
        - error
        - requestId
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - AUTH_INVALID_CREDENTIALS
            message:
              type: string
        requestId:
          type: string
    ValidationErrorEnvelope:
      type: object
      required:
        - error
        - requestId
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - VALIDATION_ERROR
            message:
              type: string
            details:
              type: array
        requestId:
          type: string
