name: ci

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout QA Release Cockpit
        uses: actions/checkout@v5
        with:
          repository: binfengke/qa-release-cockpit
          path: tools/qa-release-cockpit

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable corepack
        run: corepack enable

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build QA Release Cockpit
        run: |
          cd tools/qa-release-cockpit
          npm ci
          npm run build

      - name: Run API unit + integration tests
        run: pnpm test:api

      - name: Install Playwright (chromium)
        run: pnpm -F @qa-sample/e2e exec playwright install --with-deps chromium

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..60}; do
            curl -fsS http://localhost:3000/healthz > /dev/null && exit 0
            sleep 2
          done
          echo "API not ready"
          docker compose logs api
          exit 1

      - name: Wait for Web
        run: |
          for i in {1..60}; do
            curl -fsS http://localhost:8080/ > /dev/null && exit 0
            sleep 2
          done
          echo "Web not ready"
          docker compose logs web
          exit 1

      - name: Run smoke tests
        id: smoke
        continue-on-error: true
        run: pnpm test:smoke

      - name: Generate release readiness report
        id: release_cockpit
        continue-on-error: true
        run: |
          node tools/qa-release-cockpit/dist/cli.js analyze \
            --config qarc.config.json \
            --playwright tests/e2e/playwright-report/results.json \
            --output-dir release-cockpit-report \
            --fail-on no-go

      - name: Publish release readiness summary
        if: always() && hashFiles('release-cockpit-report/release-readiness.md') != ''
        run: cat release-cockpit-report/release-readiness.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment release readiness on PR
        if: github.event_name == 'pull_request' && hashFiles('release-cockpit-report/release-readiness.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- qa-release-cockpit-report -->';
            const report = fs.readFileSync('release-cockpit-report/release-readiness.md', 'utf8');
            const body = `${marker}\n${report}`;
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.data.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report
            tests/e2e/test-results

      - name: Upload release readiness report
        if: always() && hashFiles('release-cockpit-report/release-readiness.md') != ''
        uses: actions/upload-artifact@v7
        with:
          name: release-readiness
          path: release-cockpit-report/

      - name: Shutdown
        if: always()
        run: docker compose down -v

      - name: Enforce smoke test result
        if: steps.smoke.outcome == 'failure' && steps.release_cockpit.outcome != 'failure'
        run: |
          echo "Smoke tests failed but QA Release Cockpit did not return a blocking decision."
          exit 1

      - name: Enforce release cockpit gate
        if: steps.release_cockpit.outcome == 'failure'
        run: exit 1
